<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Портфолио Анастасии Кузнецовой</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
:root{
--bg:#d9d7cf;
--panel:#e2e0d8;
--ink:#1b1b1b;
--muted:rgba(27,27,27,.62);
--hair:rgba(27,27,27,.14);
--btn:#1b1b1b;
--btn2:rgba(27,27,27,.08);
--radius:18px;
--radius-lg:28px;
--shadow-soft:0 18px 55px rgba(0,0,0,.08);
--shadow-card:0 10px 30px rgba(0,0,0,.07);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
margin:0;
font-family:Inter,system-ui,-apple-system;
background:var(--bg);
color:var(--ink);
line-height:1.65
}

.container{width:min(1180px,calc(100% - 40px));margin:0 auto}

/* ===== HEADER ===== */

header{
position:sticky;
top:0;
z-index:50;
background:color-mix(in oklab,var(--bg) 70%,white 30%);
border-bottom:1px solid var(--hair);
backdrop-filter:blur(8px)
}

.header-content{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px 0;
gap:18px
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:700;
white-space:nowrap
}

.logo-dot{
width:10px;height:10px;
background:var(--ink);
border-radius:999px
}

nav ul{
list-style:none;
display:flex;
margin:0;padding:0;
gap:18px
}

nav a{
text-decoration:none;
color:var(--ink);
font-weight:600;
padding:8px 10px;
border-radius:999px
}

nav a:hover{background:rgba(0,0,0,.06)}

.btn{
display:inline-flex;
align-items:center;
gap:10px;
background:var(--btn);
color:#fff!important;
padding:12px 16px;
border-radius:999px;
text-decoration:none;
font-weight:700;
box-shadow:0 10px 25px rgba(0,0,0,.14)
}

.btn.secondary{
background:var(--btn2);
color:var(--ink)!important;
border:1px solid var(--hair);
box-shadow:none
}

/* ===== MOBILE MENU ===== */

.menu-fab,
.mobile-menu{display:none}

@media (max-width:560px){

header{position:static;backdrop-filter:none}

nav,
.header-content > .btn{display:none!important}

.menu-fab{
display:flex;
align-items:center;
justify-content:center;
width:44px;height:44px;
border-radius:50%;
background:rgba(0,0,0,.1);
border:1px solid var(--hair);
cursor:pointer
}

.mobile-menu{
display:block;
margin:10px auto;
width:calc(100% - 40px);
background:var(--panel);
border-radius:18px;
border:1px solid var(--hair);
overflow:hidden;
max-height:0;
opacity:0;
transition:.3s
}

.mobile-menu.open{
max-height:400px;
opacity:1
}

.mobile-menu-header{
display:flex;
justify-content:space-between;
padding:12px 16px;
border-bottom:1px solid var(--hair)
}

.mobile-menu a{
display:block;
padding:12px 16px;
text-decoration:none;
color:var(--ink);
font-weight:600
}

.mobile-menu a:hover{background:rgba(0,0,0,.06)}
}

/* ===== остальной CSS не менялся ===== */
</style>
</head>

<body>

<header>
<div class="container header-content">
<div class="logo"><span class="logo-dot"></span> Anastasia Kuznetsova</div>

<nav>
<ul>
<li><a href="#about">Обо мне</a></li>
<li><a href="#portfolio">Кейсы</a></li>
<li><a href="#skills">Навыки</a></li>
<li><a href="#contact">Контакты</a></li>
</ul>
</nav>

<a href="#contact" class="btn">Связаться</a>

<button class="menu-fab" id="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>
</div>

<div class="mobile-menu" id="mobileMenu">
<div class="mobile-menu-header">
<strong>Меню</strong>
<button id="closeMenu" style="background:none;border:none;cursor:pointer">
<i class="fa-solid fa-chevron-up"></i>
</button>
</div>
<a href="#about">Обо мне</a>
<a href="#portfolio">Кейсы</a>
<a href="#skills">Навыки</a>
<a href="#contact">Контакты</a>
</div>

</header>

<!-- ВЕСЬ ОСТАЛЬНОЙ КОНТЕНТ ОСТАВЛЕН БЕЗ ИЗМЕНЕНИЙ -->

<script>
document.querySelectorAll('.case-toggle').forEach(button=>{
button.addEventListener('click',()=>{
const details=button.nextElementSibling;
details.classList.toggle('hidden');
button.textContent=details.classList.contains('hidden')?'Подробнее':'Скрыть';
});
});

const menuBtn=document.getElementById('menuBtn');
const mobileMenu=document.getElementById('mobileMenu');
const closeMenu=document.getElementById('closeMenu');

menuBtn.addEventListener('click',()=>{
mobileMenu.classList.toggle('open');
});

closeMenu.addEventListener('click',()=>{
mobileMenu.classList.remove('open');
});
</script>

</body>
</html>
