<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Skills Block</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* Кнопка */
.more-wrapper {
  margin-top: 32px;
}

.more-btn {
  background: #111;
  color: #fff;
  border: none;
  padding: 8px 18px;
  font-size: 14px;
  font-weight: 500;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s ease;
}

.more-btn:hover {
  background: #000;
  transform: translateY(-1px);
}

/* Скрытый блок */
.more-content {
  display: none;
  margin-top: 24px;
}

/* Фильтры */
.filters {
  margin-bottom: 16px;
}

.filter-btn {
  background: transparent;
  border: 1px solid #111;
  color: #111;
  padding: 6px 14px;
  font-size: 13px;
  border-radius: 16px;
  cursor: pointer;
  margin-right: 8px;
  transition: 0.2s;
}

.filter-btn.active,
.filter-btn:hover {
  background: #111;
  color: #fff;
}

/* Поиск */
.search-input {
  display: block;
  margin-bottom: 16px;
  padding: 8px 12px;
  width: 100%;
  max-width: 320px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* Список */
.skill-list {
  list-style: none;
  padding: 0;
}

.skill-item {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="more-wrapper">
  <button class="more-btn" onclick="toggleMore()">Узнать больше</button>
</div>

<div id="moreContent" class="more-content">

  <div class="filters">
    <button class="filter-btn active" onclick="filterSkills('all', this)">Все</button>
    <button class="filter-btn" onclick="filterSkills('hard', this)">Hard skills</button>
    <button class="filter-btn" onclick="filterSkills('soft', this)">Soft skills</button>
  </div>

  <input type="text" class="search-input" placeholder="Поиск по навыкам..." onkeyup="searchSkills(this.value)">

  <ul class="skill-list" id="skillsList">
    <li class="skill-item" data-type="hard">Growth-эксперименты и аналитика</li>
    <li class="skill-item" data-type="hard">ROMI, CAC, воронка продаж</li>
    <li class="skill-item" data-type="hard">SEO и performance-оптимизация</li>
    <li class="skill-item" data-type="hard">Автоматизация и дашборды</li>
    <li class="skill-item" data-type="soft">Стратегическое мышление</li>
    <li class="skill-item" data-type="soft">Креатив и сторителлинг</li>
    <li class="skill-item" data-type="soft">Лидерство и управление командой</li>
    <li class="skill-item" data-type="soft">Коммуникация и переговоры</li>
  </ul>

</div>

<script>
function toggleMore() {
  const block = document.getElementById("moreContent");
  block.style.display = block.style.display === "block" ? "none" : "block";
}

function filterSkills(type, button) {
  const items = document.querySelectorAll(".skill-item");
  const buttons = document.querySelectorAll(".filter-btn");

  buttons.forEach(btn => btn.classList.remove("active"));
  button.classList.add("active");

  items.forEach(item => {
    if (type === "all" || item.dataset.type === type) {
      item.style.display = "list-item";
    } else {
      item.style.display = "none";
    }
  });
}

function searchSkills(query) {
  const items = document.querySelectorAll(".skill-item");
  query = query.toLowerCase();

  items.forEach(item => {
    const text = item.textContent.toLowerCase();
    item.style.display = text.includes(query) ? "list-item" : "none";
  });
}
</script>

</body>
</html>
